# =============================================================================
# Wallet Service - PostgreSQL Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: wallet-service
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app: postgres
