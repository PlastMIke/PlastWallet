# =============================================================================
# Wallet Service - Monitoring (ServiceMonitor for Prometheus)
# =============================================================================
# Requires Prometheus Operator installed
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wallet-service-monitor
  namespace: wallet-service
  labels:
    app: wallet-service
    release: prometheus
spec:
  selector:
    matchLabels:
      app: wallet-service
  namespaceSelector:
    matchNames:
      - wallet-service
  endpoints:
    - port: management
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
