# =============================================================================
# Wallet Service - Service Account
# =============================================================================
# Kubernetes service account for pod identity
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: wallet-service-sa
  namespace: wallet-service
  labels:
    app: wallet-service
  annotations:
    description: "Service account for Wallet Service pods"
# Optional: Add IAM role annotation for AWS
# annotations:
#   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/wallet-service-role
# Optional: Add GCP service account annotation
# annotations:
#   iam.gke.io/gcp-service-account: wallet-service@project.iam.gserviceaccount.com
