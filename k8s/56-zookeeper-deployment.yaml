# =============================================================================
# Wallet Service - Zookeeper Deployment (for Kafka)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: wallet-service
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - name: zookeeper
              containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
          livenessProbe:
            exec:
              command:
                - zookeeper-shell
                - localhost:2181
                - get
                - /
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - zookeeper-shell
                - localhost:2181
                - get
                - /
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: zookeeper-data
          emptyDir: {}
