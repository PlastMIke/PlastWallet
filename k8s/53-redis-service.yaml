# =============================================================================
# Wallet Service - Redis Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: wallet-service
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app: redis
