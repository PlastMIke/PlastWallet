# =============================================================================
# Wallet Service - Ingress
# =============================================================================
# External access via Ingress controller (NGINX)
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wallet-service-ingress
  namespace: wallet-service
  labels:
    app: wallet-service
  annotations:
    # NGINX Ingress annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst: "200"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # SSL/TLS
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    
    # Health checks
    nginx.ingress.kubernetes.io/health-check-path: "/actuator/health"
    nginx.ingress.kubernetes.io/health-check-interval: "30s"
    
    # Canary deployment (uncomment for canary)
    # nginx.ingress.kubernetes.io/canary: "true"
    # nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wallet.example.com
        - api.wallet.example.com
      secretName: wallet-tls-secret
  rules:
    - host: wallet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
    - host: api.wallet.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
          - path: /swagger-ui.html
            pathType: Exact
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 8080
