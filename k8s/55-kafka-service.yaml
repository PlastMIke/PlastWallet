# =============================================================================
# Wallet Service - Kafka Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: wallet-service
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: kafka
      protocol: TCP
      name: kafka
  selector:
    app: kafka
