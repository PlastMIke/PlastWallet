# =============================================================================
# Wallet Service - Kustomization
# =============================================================================
# Use: kubectl apply -k k8s/
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wallet-service

resources:
  # Core infrastructure
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secrets.yaml
  - 30-serviceaccount.yaml
  
  # Application
  - 10-deployment.yaml
  - 11-service.yaml
  - 12-ingress.yaml
  
  # Scaling and availability
  - 20-hpa.yaml
  - 21-pdb.yaml
  
  # Security
  - 31-networkpolicy.yaml
  
  # Monitoring
  - 40-servicemonitor.yaml
  
  # Dependencies (for development/testing only)
  # Comment out for production (use managed services)
  - 50-postgres-statefulset.yaml
  - 51-postgres-service.yaml
  - 52-redis-deployment.yaml
  - 53-redis-service.yaml
  - 54-kafka-deployment.yaml
  - 55-kafka-service.yaml
  - 56-zookeeper-deployment.yaml
  - 57-zookeeper-service.yaml

# Common labels
commonLabels:
  app.kubernetes.io/name: wallet-service
  app.kubernetes.io/component: service
  app.kubernetes.io/part-of: wallet-platform

# Images to replace
images:
  - name: wallet-service
    newName: wallet-service
    newTag: latest

# ConfigMap generator (optional - overrides existing)
# configMapGenerator:
#   - name: wallet-service-config
#     literals:
#       - SPRING_PROFILES_ACTIVE=production
#     behavior: merge

# Secret generator (optional - overrides existing)
# secretGenerator:
#   - name: wallet-service-secrets
#     literals:
#       - SPRING_DATASOURCE_PASSWORD=secret-password
#     behavior: merge
