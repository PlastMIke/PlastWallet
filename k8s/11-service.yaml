# =============================================================================
# Wallet Service - Service
# =============================================================================
# ClusterIP service for internal communication
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: wallet-service
  labels:
    app: wallet-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      appProtocol: http
    - name: management
      port: 8080
      targetPort: management
      protocol: TCP
  selector:
    app: wallet-service
  sessionAffinity: None
