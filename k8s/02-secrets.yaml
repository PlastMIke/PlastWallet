# =============================================================================
# Wallet Service - Secrets
# =============================================================================
# Sensitive configuration (base64 encoded)
# =============================================================================
# Note: In production, use external secrets manager (Vault, AWS Secrets Manager, etc.)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: wallet-service-secrets
  namespace: wallet-service
  labels:
    app: wallet-service
type: Opaque
stringData:
  # Database Credentials
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_DATASOURCE_PASSWORD: "postgres-secret-password"
  
  # Redis Password (if enabled)
  SPRING_DATA_REDIS_PASSWORD: ""
  
  # JWT Configuration
  APP_JWT_SECRET: "VGhpc0lzQVNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uU2VydmljZTIwMjQh"
  APP_JWT_EXPIRATION: "86400000"
  
  # Kafka SASL (if enabled)
  SPRING_KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  SPRING_KAFKA_SASL_MECHANISM: "PLAIN"
  SPRING_KAFKA_SASL_JAAS_CONFIG: ""
