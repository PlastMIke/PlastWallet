# =============================================================================
# Jaeger Configuration
# =============================================================================
# Jaeger all-in-one deployment for development/testing
# For production, use Jaeger Operator or managed service
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.50
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: COLLECTOR_OTLP_GRPC_HOST_PORT
              value: "0.0.0.0:4317"
            - name: COLLECTOR_OTLP_HTTP_HOST_PORT
              value: "0.0.0.0:4318"
            - name: MEMORY_MAX_TRACES
              value: "100000"
            - name: QUERY_BASE_PATH
              value: "/jaeger"
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: collector-grpc
              containerPort: 4317
              protocol: TCP
            - name: collector-http
              containerPort: 4318
              protocol: TCP
            - name: agent-compact
              containerPort: 5775
              protocol: UDP
            - name: agent-binary
              containerPort: 6832
              protocol: UDP
            - name: agent-http
              containerPort: 5778
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: jaeger-data
              mountPath: /tmp/jaeger
      volumes:
        - name: jaeger-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: observability
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      protocol: TCP
    - name: collector-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: collector-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: agent-compact
      port: 5775
      targetPort: 5775
      protocol: UDP
    - name: agent-binary
      port: 6832
      targetPort: 6832
      protocol: UDP
    - name: agent-http
      port: 5778
      targetPort: 5778
      protocol: TCP
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
  labels:
    app: jaeger
spec:
  type: NodePort
  ports:
    - name: ui
      port: 80
      targetPort: 16686
      protocol: TCP
      nodePort: 30686
  selector:
    app: jaeger
