# =============================================================================
# Prometheus Alert Rules
# =============================================================================
# Alerting rules for Wallet Service monitoring
# =============================================================================

groups:
  - name: wallet-service-alerts
    interval: 30s
    rules:
      # Application Down
      - alert: WalletServiceDown
        expr: up{job="wallet-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: wallet-service
        annotations:
          summary: "Wallet Service is down"
          description: "Wallet Service instance {{ $labels.instance }} has been down for more than 1 minute."

      # High Error Rate
      - alert: WalletServiceHighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="wallet-service", status=~"5.."}[5m])) 
          / sum(rate(http_server_requests_seconds_count{job="wallet-service"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # High Response Time
      - alert: WalletServiceHighResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job="wallet-service"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value | humanizeDuration }} (threshold: 2s)"

      # High Memory Usage
      - alert: WalletServiceHighMemoryUsage
        expr: |
          jvm_memory_used_bytes{job="wallet-service", area="heap"} 
          / jvm_memory_max_bytes{job="wallet-service", area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "High memory usage detected"
          description: "JVM heap memory usage is {{ $value | humanizePercentage }} (threshold: 85%)"

      # High CPU Usage
      - alert: WalletServiceHighCpuUsage
        expr: |
          process_cpu_usage{job="wallet-service"} > 0.8
        for: 5m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanizePercentage }} (threshold: 80%)"

      # Database Connection Pool Exhausted
      - alert: WalletServiceDatabasePoolExhausted
        expr: |
          hikaricp_connections_active{job="wallet-service"} 
          / hikaricp_connections_max{job="wallet-service"} > 0.9
        for: 2m
        labels:
          severity: critical
          service: wallet-service
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Active connections: {{ $value | humanizePercentage }} (threshold: 90%)"

      # Kafka Consumer Lag
      - alert: WalletServiceKafkaConsumerLag
        expr: |
          kafka_consumer_lag{job="wallet-service"} > 1000
        for: 5m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "High Kafka consumer lag detected"
          description: "Consumer lag is {{ $value }} messages (threshold: 1000)"

      # Redis Connection Failed
      - alert: WalletServiceRedisConnectionFailed
        expr: |
          redis_connection_errors_total{job="wallet-service"} > 0
        for: 1m
        labels:
          severity: critical
          service: wallet-service
        annotations:
          summary: "Redis connection errors detected"
          description: "{{ $value }} Redis connection errors in the last minute"

      # Pod Restarting Too Often
      - alert: WalletServicePodRestarting
        expr: |
          kube_pod_container_status_restarts_total{container="wallet-service"} > 3
        for: 10m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "Pod restarting frequently"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 10 minutes"

      # Low Replicas
      - alert: WalletServiceLowReplicas
        expr: |
          kube_deployment_status_replicas_available{deployment="wallet-service"} 
          < kube_deployment_spec_replicas{deployment="wallet-service"} * 0.5
        for: 5m
        labels:
          severity: critical
          service: wallet-service
        annotations:
          summary: "Low replica count"
          description: "Only {{ $value }} replicas available (expected: {{ $value | humanize }})"

      # Transaction Rate Drop
      - alert: WalletServiceTransactionRateDrop
        expr: |
          sum(rate(wallet_transactions_total{job="wallet-service"}[5m])) < 10
        for: 10m
        labels:
          severity: warning
          service: wallet-service
        annotations:
          summary: "Transaction rate dropped significantly"
          description: "Current transaction rate: {{ $value }} tx/s (threshold: 10 tx/s)"

  - name: infrastructure-alerts
    interval: 30s
    rules:
      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgresql
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding"

      # Redis Down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is not responding"

      # Kafka Broker Down
      - alert: KafkaBrokerDown
        expr: kafka_brokers < 1
        for: 1m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka broker is down"
          description: "No Kafka brokers are available"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} 
          / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value | humanizePercentage }} available (threshold: 10%)"

      # Node Memory Pressure
      - alert: NodeMemoryPressure
        expr: |
          (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Node memory pressure"
          description: "Available memory is {{ $value | humanizePercentage }} (threshold: 10%)"
