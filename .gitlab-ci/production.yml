# =============================================================================
# GitLab CI/CD - Production Pipeline (Separate file for production-specific config)
# =============================================================================
# Use this for production deployments with additional security and approvals
# =============================================================================

include:
  - local: '.gitlab-ci.yml'

# Override production deployment with additional checks
deploy-production:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  environment:
    name: production
    url: https://wallet.example.com
    on_stop: stop-production
    auto_stop_in: never
  script:
    - echo "=== Production Deployment ==="
    - echo "Deploying version: $DOCKER_IMAGE_TAG"
    - echo "Commit: $CI_COMMIT_SHA"
    - echo "Author: $GITLAB_USER_LOGIN"
    - echo ""
    
    # Pre-deployment checks
    - echo "Running pre-deployment checks..."
    - kubectl config use-context $KUBE_CONTEXT_PROD
    
    # Verify current deployment health
    - kubectl get deployment $APP_NAME -n $APP_NAME-prod -o jsonpath='{.status.readyReplicas}'
    
    # Create backup before deployment
    - echo "Creating database backup..."
    - kubectl create job --from=cronjob/db-backup db-backup-manual -n $APP_NAME-prod || true
    
    # Deploy new version
    - echo "Deploying new version..."
    - kubectl set image deployment/$APP_NAME $APP_NAME=$DOCKER_IMAGE:$DOCKER_IMAGE_TAG -n $APP_NAME-prod
    
    # Monitor rollout
    - kubectl rollout status deployment/$APP_NAME -n $APP_NAME-prod --timeout=600s
    
    # Post-deployment health checks
    - sleep 60
    - echo "Running post-deployment health checks..."
    - kubectl run health-check-$$ --rm -it --image=curlimages/curl --restart=Never -- curl -sf https://wallet.example.com/actuator/health || exit 1
    - kubectl run health-check-$$ --rm -it --image=curlimages/curl --restart=Never -- curl -sf https://wallet.example.com/actuator/health/readiness || exit 1
    
    # Verify metrics endpoint
    - kubectl run metrics-check-$$ --rm -it --image=curlimages/curl --restart=Never -- curl -sf https://wallet.example.com/actuator/prometheus | head -5 || true
    
    - echo "✅ Production deployment completed successfully!"
  variables:
    KUBE_CONTEXT_PROD: "prod-cluster"
    DOCKER_IMAGE_TAG: $CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: manual
  needs:
    - build-image
    - deploy-staging
  when: manual
  allow_failure: false
  timeout: 30m

# Rollback job for production
rollback-production:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  environment:
    name: production
    action: stop
  script:
    - echo "Rolling back production deployment..."
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - kubectl rollout undo deployment/$APP_NAME -n $APP_NAME-prod
    - kubectl rollout status deployment/$APP_NAME -n $APP_NAME-prod --timeout=300s
    - echo "✅ Rollback completed!"
  variables:
    KUBE_CONTEXT_PROD: "prod-cluster"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: manual
  when: manual
  allow_failure: false

# Stop production environment (for auto_stop_in)
stop-production:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  environment:
    name: production
    action: stop
  script:
    - echo "Stopping production environment..."
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - kubectl scale deployment/$APP_NAME --replicas=0 -n $APP_NAME-prod
  variables:
    KUBE_CONTEXT_PROD: "prod-cluster"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
      when: manual
  when: manual
  allow_failure: true

# Production verification job
verify-production:
  stage: deploy
  image: curlimages/curl:latest
  tags:
    - docker
  environment:
    name: production
  script:
    - echo "Verifying production deployment..."
    - curl -sf https://wallet.example.com/actuator/health | jq .
    - curl -sf https://wallet.example.com/actuator/info | jq .
    - curl -sf https://wallet.example.com/actuator/metrics | jq '.names | length'
    - echo "✅ Production verification completed!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
  needs:
    - deploy-production
  when: on_success
  allow_failure: true
