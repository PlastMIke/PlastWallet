# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=VGhpc0lzQVNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uU2VydmljZTIwMjQh
app.jwt.expiration=86400000

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=plastwallet-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false

# Kafka Topics
kafka.topics.transactions=wallet-transactions
kafka.topics.notifications=wallet-notifications

# Kafka Retry Configuration
kafka.retry.max-attempts=3
kafka.retry.backoff-ms=1000

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Lettuce connection pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache Configuration
cache.default.ttl=300
cache.wallets.ttl=300
cache.users.ttl=600
cache.transactions.ttl=120
cache.balances.ttl=60

# Logging
logging.level.com.wallet=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=WARN

# =============================================================================
# Observability Configuration
# =============================================================================

# Spring Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,threaddump,heapdump,env,loggers
management.endpoints.web.exposure.exclude=
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Prometheus
management.metrics.tags.application=${spring.application.name:wallet-service}
management.metrics.tags.instance=${spring.cloud.client.ip-address:localhost}
management.metrics.export.prometheus.enabled=true

# OpenTelemetry / Jaeger Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Application Info
info.app.name=PlastWallet
info.app.description=PlastWallet - Digital Wallet Service with Clean Architecture
info.app.version=@project.version@
info.app.java.version=@java.version@

# =============================================================================
# Springdoc OpenAPI Configuration
# =============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=com.wallet.interfaces.api
springdoc.paths-to-match=/api/**

# =============================================================================
# Telegram Bot Configuration
# =============================================================================
# Get bot token from @BotFather on Telegram
# Environment variables: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
telegram.bot.token=${TELEGRAM_BOT_TOKEN:YOUR_BOT_TOKEN_HERE}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:PlastWalletMonitorBot}
telegram.chat.id=${TELEGRAM_CHAT_ID:YOUR_CHAT_ID_HERE}
telegram.webhook.url=${TELEGRAM_WEBHOOK_URL:}

# Scheduled notifications
telegram.notifications.daily-report.enabled=${TELEGRAM_NOTIFICATIONS_DAILY_REPORT_ENABLED:true}
telegram.notifications.health-check.enabled=${TELEGRAM_NOTIFICATIONS_HEALTH_CHECK_ENABLED:true}
telegram.notifications.morning-summary.enabled=${TELEGRAM_NOTIFICATIONS_MORNING_SUMMARY_ENABLED:true}
